##
# BRAND DEVELOPMENT CYCLE — Workflow AIOS
# Ciclo completo de desenvolvimento de marca em 9 fases sequenciais
#
# Ativar com: @brand-director *start-brand-project [NOME-DO-CLIENTE]
# Ou fase específica: @brand-director *[fase] [SLUG-CLIENTE]
##

workflow:
  id: brand-development-cycle
  name: "Brand Development Cycle"
  version: "1.0"
  description: >
    Workflow completo de desenvolvimento de marca pessoal ou empresarial.
    9 fases sequenciais produzem um brand book completo e acionável.
    Cada fase tem gate de qualidade antes de avançar.

  squad: creative-hub
  primary_agent: "@brand-director"

  trigger:
    commands:
      - "*start-brand-project"
      - "*bdc"
    manual_phases: true  # Permite iniciar fase individual

  config:
    mode: interactive  # interactive | yolo | pre-flight
    auto_advance: false  # Requer confirmação humana entre fases
    save_state: true
    state_file: "clients/{client_slug}/sessions/workflow-state.json"
    workspace_template: "clients/_template/"
    workspace_path: "clients/{client_slug}/"

  elicitation:
    on_start:
      - question: "Qual é o nome do cliente/marca?"
        param: client_name
        required: true
      - question: "Qual é o slug identificador? (kebab-case, sem espaços)"
        param: client_slug
        required: true
        validate: "^[a-z0-9-]+$"
      - question: "Modo de execução?"
        param: mode
        options: ["interactive", "yolo", "pre-flight"]
        default: interactive
      - question: "Segundo Cérebro habilitado?"
        param: second_brain_enabled
        type: boolean
        default: false

##
# FASES DO CICLO
##

phases:

  # ─────────────────────────────────
  # FASE 0: SETUP DO WORKSPACE
  # ─────────────────────────────────
  - id: phase-00-setup
    name: "Setup do Workspace"
    order: 0
    executor: "@brand-director"
    task: "tasks/client-workspace-setup.md"
    mode: autonomous  # Não requer input — operação técnica

    inputs:
      - client_name: "{client_name}"
      - client_slug: "{client_slug}"
      - mode: "{mode}"

    actions:
      - action: copy_template
        from: "clients/_template/"
        to: "clients/{client_slug}/"
      - action: fill_workspace_yaml
        file: "clients/{client_slug}/workspace.yaml"
        data:
          client_name: "{client_name}"
          client_slug: "{client_slug}"
          created_at: "{today}"
          mode: "{mode}"

    outputs:
      - file: "clients/{client_slug}/workspace.yaml"
      - directory: "clients/{client_slug}/"

    quality_gates:
      - criterion: "Diretório do cliente criado"
        check: directory_exists("clients/{client_slug}/")
      - criterion: "workspace.yaml preenchido com dados do cliente"
        check: file_exists("clients/{client_slug}/workspace.yaml")

    on_success:
      - update_status: phase_00_setup = true
      - next_phase: phase-01-briefing
      - notify: "Workspace criado! Iniciando Fase 1 — Briefing."


  # ─────────────────────────────────
  # FASE 1: BRIEFING E DISCOVERY
  # ─────────────────────────────────
  - id: phase-01-briefing
    name: "Briefing e Discovery"
    order: 1
    executor: "@brand-director"
    task: "tasks/brand-director-briefing.md"
    mode: "{mode}"

    prompts_reference:
      - "modules/01-branding/phase-01-briefing/prompts/P01-brand-intake.md"
      - "modules/01-branding/phase-01-briefing/prompts/P01-competitive.md"
      - "modules/01-branding/phase-01-briefing/prompts/P01-audit-existing.md"

    inputs:
      - workspace: "clients/{client_slug}/workspace.yaml"
      - briefing_form: "clients/{client_slug}/briefing/brand-briefing.md"

    elicitation:
      - "Discovery em 7 blocos — ver P01-brand-intake.md"
      - "Análise competitiva se solicitado — ver P01-competitive.md"
      - "Audit de marca existente se rebranding — ver P01-audit-existing.md"

    outputs:
      - file: "clients/{client_slug}/briefing/brand-briefing.md"
        description: "Briefing completo preenchido"

    quality_gate:
      id: gate-01
      pass_threshold: 4  # de 5 critérios
      criteria:
        - "7 blocos do briefing preenchidos com profundidade"
        - "Tensões e gaps identificados na síntese"
        - "Hipóteses de posicionamento levantadas"
        - "Perguntas em aberto documentadas"
        - "Completude do briefing >= 80%"

    on_pass:
      - update_status: phase_01_briefing = true
      - next_phase: phase-02-positioning

    on_fail:
      - action: request_more_info
      - retry: true
      - max_retries: 2


  # ─────────────────────────────────
  # FASE 2: POSICIONAMENTO
  # ─────────────────────────────────
  - id: phase-02-positioning
    name: "Posicionamento e Bússola de Marca"
    order: 2
    executor: "@brand-director"
    task: "tasks/brand-director-positioning.md"
    mode: "{mode}"

    depends_on: [phase-01-briefing]

    prompts_reference:
      - "modules/01-branding/phase-02-positioning/prompts/P02-compass.md"
      - "modules/01-branding/phase-02-positioning/prompts/P02-differentiation.md"

    inputs:
      - briefing: "clients/{client_slug}/briefing/brand-briefing.md"

    outputs:
      - file: "clients/{client_slug}/brand-guidelines/positioning.md"

    quality_gate:
      id: gate-02
      pass_threshold: 4
      criteria:
        - "Posicionamento statement completo e específico"
        - "Diferencial central verificável (não genérico)"
        - "Mapa de diferenciação com ao menos 4 dimensões"
        - "Propósito, Visão, Missão alinhados"
        - "Essência da marca definida"

    on_pass:
      - update_status: phase_02_positioning = true
      - next_phase: phase-03-audience


  # ─────────────────────────────────
  # FASE 3: PÚBLICO-ALVO
  # ─────────────────────────────────
  - id: phase-03-audience
    name: "Público-Alvo, Personas e Jornada"
    order: 3
    executor: "@brand-director"
    task: "tasks/brand-director-audience.md"
    mode: "{mode}"

    depends_on: [phase-02-positioning]

    prompts_reference:
      - "modules/01-branding/phase-03-audience/prompts/P03-icp.md"
      - "modules/01-branding/phase-03-audience/prompts/P03-persona-primary.md"
      - "modules/01-branding/phase-03-audience/prompts/P03-journey.md"

    inputs:
      - briefing: "clients/{client_slug}/briefing/brand-briefing.md"
      - positioning: "clients/{client_slug}/brand-guidelines/positioning.md"

    outputs:
      - file: "clients/{client_slug}/brand-guidelines/audience.md"

    quality_gate:
      id: gate-03
      pass_threshold: 4
      criteria:
        - "ICP com perfil demográfico E psicográfico"
        - "Persona primária com bio, objetivos, frustrações, vocabulário"
        - "Anti-persona definida com justificativa estratégica"
        - "Jornada em 5 etapas com papel da marca em cada"
        - "Persona secundária definida"

    on_pass:
      - update_status: phase_03_audience = true
      - next_phase: phase-04-voice


  # ─────────────────────────────────
  # FASE 4: VOZ E TOM
  # ─────────────────────────────────
  - id: phase-04-voice
    name: "Personalidade, Voz e Vocabulário"
    order: 4
    executor: "@brand-director"
    task: "tasks/brand-director-voice.md"
    mode: "{mode}"

    depends_on: [phase-03-audience]

    prompts_reference:
      - "modules/01-branding/phase-04-voice/prompts/P04-personality.md"
      - "modules/01-branding/phase-04-voice/prompts/P04-voice-definition.md"
      - "modules/01-branding/phase-04-voice/prompts/P04-vocabulary.md"

    data_references:
      - "data/brand-archetypes.md"
      - "data/voice-tones-library.md"

    inputs:
      - positioning: "clients/{client_slug}/brand-guidelines/positioning.md"
      - audience: "clients/{client_slug}/brand-guidelines/audience.md"

    outputs:
      - file: "clients/{client_slug}/brand-guidelines/voice-and-tone.md"

    quality_gate:
      id: gate-04
      pass_threshold: 4
      criteria:
        - "Arquétipo primário e secundário definidos com justificativa"
        - "DNA de voz com ao menos 4 escalas posicionadas"
        - "Tom definido para ao menos 4 contextos diferentes"
        - "Vocabulário: ≥10 palavras sim e ≥5 palavras não"
        - "Card para IA pronto"

    on_pass:
      - update_status: phase_04_voice = true
      - next_phase: phase-05-narrative


  # ─────────────────────────────────
  # FASE 5: NARRATIVA
  # ─────────────────────────────────
  - id: phase-05-narrative
    name: "Narrativa, Brand Story e Manifesto"
    order: 5
    executor: "@brand-director"
    task: "tasks/brand-director-narrative.md"
    mode: "{mode}"

    depends_on: [phase-04-voice]

    prompts_reference:
      - "modules/01-branding/phase-05-narrative/prompts/P05-brand-story.md"
      - "modules/01-branding/phase-05-narrative/prompts/P05-manifesto.md"
      - "modules/01-branding/phase-05-narrative/prompts/P05-story-bank.md"

    data_references:
      - "data/narrative-structures.md"

    inputs:
      - positioning: "clients/{client_slug}/brand-guidelines/positioning.md"
      - audience: "clients/{client_slug}/brand-guidelines/audience.md"
      - voice: "clients/{client_slug}/brand-guidelines/voice-and-tone.md"
      - briefing: "clients/{client_slug}/briefing/brand-briefing.md"

    outputs:
      - file: "clients/{client_slug}/brand-guidelines/narrative.md"
      - file: "clients/{client_slug}/content/story-bank.md"

    quality_gate:
      id: gate-05
      pass_threshold: 3
      criteria:
        - "Brand story com 5 atos e 3 versões de comprimento"
        - "Manifesto aprovado pelo cliente"
        - "Banco com ao menos 5 histórias-semente"
        - "Story bank iniciado com tipos variados"

    on_pass:
      - update_status: phase_05_narrative = true
      - next_phase: phase-06-editorial


  # ─────────────────────────────────
  # FASE 6: EDITORIAL
  # ─────────────────────────────────
  - id: phase-06-editorial
    name: "Linha Editorial e Grade de Conteúdo"
    order: 6
    executor: "@brand-director"
    task: "tasks/brand-director-editorial.md"
    mode: "{mode}"

    depends_on: [phase-05-narrative]

    prompts_reference:
      - "modules/01-branding/phase-06-editorial/prompts/P06-content-pillars.md"
      - "modules/01-branding/phase-06-editorial/prompts/P06-weekly-line.md"

    inputs:
      - positioning: "clients/{client_slug}/brand-guidelines/positioning.md"
      - audience: "clients/{client_slug}/brand-guidelines/audience.md"
      - voice: "clients/{client_slug}/brand-guidelines/voice-and-tone.md"
      - narrative: "clients/{client_slug}/brand-guidelines/narrative.md"

    outputs:
      - file: "clients/{client_slug}/brand-guidelines/editorial.md"

    quality_gate:
      id: gate-06
      pass_threshold: 4
      criteria:
        - "4-5 pilares com propósito claro e não sobrepostos"
        - "Grade editorial semanal com ao menos 4 dias"
        - "Proporção de tipos definida"
        - "Temas tabu listados"
        - "Formatos por canal especificados"

    on_pass:
      - update_status: phase_06_editorial = true
      - next_phase: phase-07-visual


  # ─────────────────────────────────
  # FASE 7: VISUAL
  # ─────────────────────────────────
  - id: phase-07-visual
    name: "Brief de Identidade Visual"
    order: 7
    executor: "@brand-director"
    task: "tasks/brand-director-visual-brief.md"
    mode: "{mode}"

    depends_on: [phase-06-editorial]

    prompts_reference:
      - "modules/01-branding/phase-07-visual/prompts/P07-visual-direction.md"
      - "modules/01-branding/phase-07-visual/prompts/P07-color-system.md"

    inputs:
      - positioning: "clients/{client_slug}/brand-guidelines/positioning.md"
      - voice: "clients/{client_slug}/brand-guidelines/voice-and-tone.md"

    outputs:
      - file: "clients/{client_slug}/brand-guidelines/visual-brief.md"

    quality_gate:
      id: gate-07
      pass_threshold: 4
      criteria:
        - "3 palavras de personalidade visual definidas"
        - "Referências e anti-referências listadas"
        - "Paleta com ao menos 4 cores com código hex"
        - "Tipografia com ao menos 2 famílias e uso definido"
        - "Diretrizes de fotografia (sim/não)"

    on_pass:
      - update_status: phase_07_visual = true
      - next_phase: phase-08-digital


  # ─────────────────────────────────
  # FASE 8: DIGITAL
  # ─────────────────────────────────
  - id: phase-08-digital
    name: "Diretrizes de Presença Digital"
    order: 8
    executor: "@brand-director"
    task: "tasks/brand-director-digital.md"
    mode: "{mode}"

    depends_on: [phase-07-visual]

    prompts_reference:
      - "modules/01-branding/phase-08-digital/prompts/P08-instagram.md"
      - "modules/01-branding/phase-08-digital/prompts/P08-linkedin.md"
      - "modules/01-branding/phase-08-digital/prompts/P08-tiktok.md"
      - "modules/01-branding/phase-08-digital/prompts/P08-email.md"

    inputs:
      - audience: "clients/{client_slug}/brand-guidelines/audience.md"
      - voice: "clients/{client_slug}/brand-guidelines/voice-and-tone.md"
      - editorial: "clients/{client_slug}/brand-guidelines/editorial.md"

    note: "Gere apenas os canais que estão ativos para este cliente"

    outputs:
      - file: "clients/{client_slug}/brand-guidelines/digital-guidelines.md"

    quality_gate:
      id: gate-08
      pass_threshold: 3
      criteria:
        - "Canais ativos priorizados com justificativa"
        - "Bio/perfil definido para cada canal ativo"
        - "Tom específico por canal"
        - "Frequência definida por canal"

    on_pass:
      - update_status: phase_08_digital = true
      - next_phase: phase-09-brandbook


  # ─────────────────────────────────
  # FASE 9: BRAND BOOK
  # ─────────────────────────────────
  - id: phase-09-brandbook
    name: "Compilação do Brand Book"
    order: 9
    executor: "@brand-director"
    task: "tasks/brand-director-compile-brandbook.md"
    mode: "{mode}"

    depends_on:
      - phase-08-digital  # Todas as fases anteriores implicitamente

    prompts_reference:
      - "modules/01-branding/phase-09-brandbook/prompts/P09-compile.md"
      - "modules/01-branding/phase-09-brandbook/prompts/P09-executive-summary.md"

    templates_reference:
      - "templates/brand-book-master.md"

    inputs:
      - all_guidelines: "clients/{client_slug}/brand-guidelines/"
      - briefing: "clients/{client_slug}/briefing/brand-briefing.md"

    outputs:
      - file: "clients/{client_slug}/deliverables/brand-book.md"
        description: "Brand book compilado e completo"

    # Gate de completude antes de compilar
    pre_gate:
      checklist: "checklists/brand-completeness-gate.md"
      pass_threshold: 8  # 8/10 áreas aprovadas
      block_on_fail: true

    quality_gate:
      id: gate-09
      pass_threshold: 5
      criteria:
        - "Todos os capítulos presentes e completos"
        - "Quick Reference Card preenchida"
        - "Executive summary em 3 versões"
        - "Sem variáveis [COLCHETES] não preenchidas"
        - "Consistência verificada entre seções"
        - "Versão e data registradas"

    on_pass:
      - update_status: phase_09_brandbook = true
      - next_phase: phase-delivery


  # ─────────────────────────────────
  # FASE 10: ENTREGA
  # ─────────────────────────────────
  - id: phase-delivery
    name: "Gate de Entrega ao Cliente"
    order: 10
    executor: "@brand-director"
    task: "checklists/client-delivery-gate.md"
    mode: autonomous

    depends_on: [phase-09-brandbook]

    actions:
      - run_checklist: "checklists/client-delivery-gate.md"

    quality_gate:
      id: gate-delivery
      pass_threshold: 7  # Todos os 7 blocos aprovados
      block_on_fail: true
      critical_blocks:
        - block_3_personalization  # Zero tolerância para campos não preenchidos

    on_pass:
      - update_status: client_delivery_gate = true
      - update_status: delivered = true
      - update_workspace: status.current = "delivered"
      - notify: "✅ Projeto concluído! Brand book pronto para entrega ao cliente."

    on_fail:
      - notify: "⚠️ Gate de entrega não passou. Itens a resolver antes da entrega."
      - list_gaps: true


##
# TRATAMENTO DE ERROS GLOBAL
##

error_handling:

  on_gate_fail:
    action: pause_and_notify
    message: "Gate {gate_id} não passou. Resolver antes de avançar."
    max_retries: 3
    on_max_retries: escalate_to_user

  on_agent_blocked:
    action: pause
    notify: true
    message: "@brand-director está bloqueado na fase {current_phase}. Intervenção necessária."

  on_timeout:
    timeout_minutes: 60
    action: save_state_and_pause

  circuit_breaker:
    failure_threshold: 3
    reset_timeout_minutes: 30
    on_open: save_state_and_notify

  state_recovery:
    auto_resume: true
    state_file: "clients/{client_slug}/sessions/workflow-state.json"


##
# INTEGRAÇÃO COM SEGUNDO CÉREBRO (opcional)
##

second_brain_integration:
  enabled: "{second_brain_enabled}"

  when_enabled:
    - phase: phase-04-voice
      action: "Consultar perfis clonados relevantes para calibração de voz"
      agent: "@brand-director"
    - phase: phase-05-narrative
      action: "Usar estruturas narrativas de referências para enriquecer brand story"
      agent: "@brand-director"
    - phase: phase-06-editorial
      action: "Aplicar frameworks de conteúdo de referências"
      agent: "@brand-director"

  profiles_path: "clients/{client_slug}/second-brain/"
  methodology: "modules/02-second-brain/methodology/cloning-protocol.md"


##
# MÉTRICAS E QUALIDADE
##

metrics:
  track:
    - total_duration_hours
    - phases_completed
    - gate_pass_rate
    - retries_per_gate
    - client_feedback_score

  quality_baseline:
    min_gate_pass_rate: 0.80  # 80% dos critérios em cada gate
    max_retries_acceptable: 2
    target_delivery_days: 14


##
# REFERÊNCIAS DO FRAMEWORK
##

references:
  agents:
    primary: "creative-hub/agents/brand-director.md"
    support: ".aios-core/development/agents/"

  tasks:
    directory: "creative-hub/tasks/"

  templates:
    directory: "creative-hub/templates/"
    brand_book: "creative-hub/templates/brand-book-master.md"

  data:
    archetypes: "creative-hub/data/brand-archetypes.md"
    voice_tones: "creative-hub/data/voice-tones-library.md"
    narratives: "creative-hub/data/narrative-structures.md"
    industries: "creative-hub/data/industry-contexts.md"

  checklists:
    completeness: "creative-hub/checklists/brand-completeness-gate.md"
    delivery: "creative-hub/checklists/client-delivery-gate.md"
