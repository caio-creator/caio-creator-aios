<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Card — Caio Creator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Inter, sans-serif;
        }
        .canvas {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .business-card {
            width: 90mm;
            height: 50mm;
            background: linear-gradient(135deg, #2563EB 0%, #1E40AF 100%);
            border-radius: 4px;
            padding: 12mm;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: #FAFAFA;
            position: relative;
            overflow: hidden;
        }
        .card-accent {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 30mm;
            height: 30mm;
            background: rgba(249, 115, 22, 0.1);
            border-radius: 50%;
            transform: translate(10mm, 10mm);
        }
        .card-content {
            position: relative;
            z-index: 2;
        }
        .card-header {
            margin-bottom: 10mm;
        }
        .card-logo {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 2mm;
        }
        .card-tagline {
            font-size: 9px;
            opacity: 0.9;
            font-weight: 500;
        }
        .card-footer {
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 6mm;
        }
        .card-name {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 2mm;
        }
        .card-details {
            font-size: 8px;
            opacity: 0.85;
            line-height: 1.4;
        }
        .label { color: #FAFAFA; display: block; }
    </style>
</head>
<body>
    <div class="canvas">
        <h2 style="margin-bottom: 20px; color: #333; font-size: 18px;">Business Card — Caio Creator</h2>
        <div class="business-card">
            <div class="card-accent"></div>
            <div class="card-content">
                <div class="card-header">
                    <div class="card-logo">CAIO</div>
                    <div class="card-tagline">Criatividade Intencional</div>
                </div>
            </div>
            <div class="card-footer">
                <div class="card-name">Caio Almeida</div>
                <div class="card-details">
                    <span class="label">caio@creator.com</span>
                    <span class="label">+55 (11) 99999-9999</span>
                    <span class="label">caio-creator.com</span>
                </div>
            </div>
        </div>
        <p style="margin-top: 20px; color: #666; font-size: 12px;">
            💡 Vertical layout, blue gradient, accent color hint, minimal typography
        </p>
    </div>
</body>
</html>
