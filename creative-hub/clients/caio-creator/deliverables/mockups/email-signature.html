<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Email Signature — Caio Creator</title>
    <style>
        body { margin: 0; padding: 20px; background: #f5f5f5; font-family: Inter, sans-serif; }
        .canvas { background: white; padding: 30px; border-radius: 8px; }
        table { width: 100%; max-width: 600px; }
        td { padding: 8px 0; }
        .name { font-size: 14px; font-weight: 600; color: #0A0A0B; }
        .title { font-size: 12px; color: #2563EB; margin-top: 2px; }
        .contact { font-size: 11px; color: #71717A; margin-top: 8px; }
        .divider { height: 1px; background: #E4E4E7; margin: 12px 0; }
        .logo { color: #2563EB; font-weight: 700; font-size: 16px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="canvas">
        <h2 style="margin-bottom: 20px; color: #333; font-size: 18px;">Email Signature</h2>
        <table>
            <tr>
                <td>
                    <div class="logo">CAIO</div>
                    <div class="name">Caio Almeida</div>
                    <div class="title">Creative Strategist & Founder</div>
                    <div class="divider"></div>
                    <div class="contact">
                        📧 caio@creator.com<br>
                        🌐 caio-creator.com<br>
                        🐦 @caio_creator
                    </div>
                </td>
            </tr>
        </table>
        <p style="margin-top: 20px; color: #666; font-size: 12px;">
            💡 Minimal, email-safe, brand colors used sparingly, all links included
        </p>
    </div>
</body>
</html>
