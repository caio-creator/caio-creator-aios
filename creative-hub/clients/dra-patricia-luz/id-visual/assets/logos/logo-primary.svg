<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle for logo mark -->
  <defs>
    <style>
      .logo-mark { fill: #A8D5D1; }
      .logo-text { font-family: 'Cormorant Garamond', serif; fill: #3D3D3D; }
      .logo-accent { fill: #5C8F8A; }
    </style>
  </defs>

  <!-- Circular mark -->
  <circle cx="50" cy="50" r="45" class="logo-mark" opacity="0.2"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#A8D5D1" stroke-width="1.5" opacity="0.6"/>

  <!-- Elegant symbolic element: curved line representing care/gentleness -->
  <path d="M 30 60 Q 50 40, 70 60" fill="none" stroke="#5C8F8A" stroke-width="2" stroke-linecap="round"/>
  <circle cx="50" cy="50" r="3" class="logo-accent"/>

  <!-- Brand name -->
  <text x="100" y="85" font-size="20" font-weight="300" class="logo-text">Dra. Patrícia Luz</text>

  <!-- Tagline subtitle -->
  <text x="100" y="105" font-size="10" class="logo-text" opacity="0.7">Cuidado humanizado</text>
</svg>
