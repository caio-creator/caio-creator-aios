    - name: "Isolado"
      file: "assets/logos/logo-isolated.svg"
      usage: "Favicon, watermark, ícone de aplicações"

typography:
  primary:
    name: "Cormorant Garamond"
    weights: [300, 400, 600]
    sizes: [28, 32, 36, 48]
    usage: "Nome da marca, titulares, destaques, elegância"
    source: "Google Fonts"
  secondary:
    name: "DM Sans"
    weights: [400, 500, 300]
    sizes: [12, 14, 16, 18, 20]
    usage: "Corpo de texto, legendas, subtítulos, clareza"
    source: "Google Fonts"
  hierarchy:
    - name: "Nome da marca"
      font: "Cormorant Garamond"
      weight: 300
      size: 48
      usage: "Logo, capa, papelaria de destaque"
    - name: "Titular"
      font: "Cormorant Garamond"
      weight: 600
      size: 36
      usage: "Títulos de post, seções principais"
    - name: "Subtítulo"
      font: "DM Sans"
      weight: 500
      size: 20
      usage: "Subtítulos, rótulos, destaques secundários"
    - name: "Corpo"
      font: "DM Sans"
      weight: 400
      size: 16
      usage: "Texto corrido, descrições, legendas"
    - name: "Caption"
      font: "DM Sans"
      weight: 300
      size: 12
      usage: "Informações de rodapé, dados formais, CRO"

colors:
  primary:
    - name: "Aqua Luz"
      hex: "#A8D5D1"
      rgb: "168, 213, 209"
      usage: "Cor de marca — acento principal, elementos de destaque, ícones, bordas, CTAs"
      semantic: "primary"
  secondary:
    - name: "Nude Confiança"
      hex: "#D4B5A0"
      rgb: "212, 181, 160"
      usage: "Cor de apoio — warmth, humanização, elementos de cuidado"
      semantic: "secondary"
    - name: "Verde Profundo"
      hex: "#5C8F8A"
      rgb: "92, 143, 138"
      usage: "Versão escura do Aqua Luz — textos coloridos, versão mais formal, destaque"
      semantic: "tertiary"
  neutral:
    - name: "Branco Nuvem"
      hex: "#F9F7F5"
      rgb: "249, 247, 245"
      usage: "Fundo principal — levemente warm, nunca frio"
      semantic: "background-primary"
    - name: "Bege Elegante"
      hex: "#EDE5DC"
      rgb: "237, 229, 220"
      usage: "Fundo secundário, cartões, elementos de fundo em composições"
      semantic: "background-secondary"
    - name: "Carvão Suave"
      hex: "#3D3D3D"
      rgb: "61, 61, 61"
      usage: "Texto principal, titulares — nunca preto puro"
      semantic: "text-primary"
    - name: "Cinza Névoa"
      hex: "#B8B5B2"
      rgb: "184, 181, 178"
      usage: "Texto secundário, ícones inativos, separadores"
      semantic: "text-secondary"

