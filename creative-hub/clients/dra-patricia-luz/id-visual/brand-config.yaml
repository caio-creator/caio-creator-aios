photography:
  aesthetic: "Real e Luminoso — Natural, quente-neutra, sem filtros frios ou artificiais"
  mood_guidelines: |
    Paleta de luz: Natural, quente-neutra. Sem filtros frios ou azulados (hospitalar).
    Sem excesso de flash. Lumínica, como um consultório bem iluminado por janela.

  yes_include:
    - name: "Dra. Patrícia"
      description: "Sorrindo naturalmente, em contato visual, expressão de presença — não pose clínica"
    - name: "Ambiente"
      description: "Consultório limpo, luminoso, detalhes de organização e cuidado — não estéril"
    - name: "Mãos"
      description: "Delicadas, cuidadosas — gesticulando, apontando, orientando"
    - name: "Materiais"
      description: "Produtos de qualidade em contexto — não exposição técnica de instrumentos"
    - name: "Texturas"
      description: "Linho, cerâmica, verde suave, branco warm — evocam cuidado e bem-estar"

  avoid_include:
    - "Boca aberta em primeiro plano com instrumentos visíveis"
    - "Fotos com luz fria/azulada (estilo hospital)"
    - "Sorrisos exageradamente perfeitos/artificiais"
    - "Dentista com máscara e luvas em pose"
    - "Fundos brancos puros em fotos de ambiente"

  mood_images:
    - "assets/photography/photo-1.jpg"
    - "assets/photography/photo-2.jpg"

