      css: ".card { padding: 24px; background: white; border: 1px solid #E5E5E5; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: box-shadow 0.3s; } .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }"
      usage: "Apresentação de serviços, conteúdo em grid"
  badges:
    - name: "Humanizado"
      html: "<span style='padding: 8px 14px; background: #A8D5D1; color: #3D3D3D; border-radius: 20px; font-size: 12px; font-weight: 600; font-family: DM Sans; display: inline-block;'>✓ Atendimento Humanizado</span>"
      css: ".badge { padding: 8px 14px; background: #A8D5D1; color: #3D3D3D; border-radius: 20px; font-size: 12px; font-weight: 600; font-family: 'DM Sans', sans-serif; }"
      usage: "Destaque de valores, qualidades da marca"
    - name: "Disponibilidade"
      html: "<span style='padding: 8px 14px; background: #D4B5A0; color: white; border-radius: 20px; font-size: 12px; font-weight: 600; font-family: DM Sans; display: inline-block;'>✓ Atende Sábados 8h-18h</span>"
      css: ".badge-availability { padding: 8px 14px; background: #D4B5A0; color: white; border-radius: 20px; font-size: 12px; font-weight: 600; }"
      usage: "Diferencial competitivo"

